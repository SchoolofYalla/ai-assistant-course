<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Course</title>
    <link rel="icon" type="image/png" href="./Day-1-Greetings/assets/new%20logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lessons-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
            padding: 0 1rem;
        }
        .lesson-card {
            background-color: #1e293b;
            padding: 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            color: #f8fafc;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.3s ease;
            border: 1px solid #334155;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .lesson-card:hover {
            transform: translateY(-5px);
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <h1>AI Assistant Course</h1>
    <div class="lessons-container">
        <!-- Add new lessons here as you build them! -->
        <a href="./Day-1-Greetings/" class="lesson-card">Day 1 - Greetings</a>
        <a href="./Day-2-Good-Morning/" class="lesson-card">Day 2 - Good Morning</a>
        <a href="./Day-3-Pronouns/" class="lesson-card">Day 3 - Pronouns</a>
        <a href="./Day-4-Names-Introductions/" class="lesson-card">Day 4 - Names & Introductions</a>
        <a href="./Day-5-How-Are-You/" class="lesson-card">Day 5 - How Are You?</a>
        <a href="./Day-6-Where-Are-You-From/" class="lesson-card">Day 6 - Where Are You From?</a>
    </div>
</body>
</html>
